name: Build desktop apps

# Two ways to run:
#   1. Push a tag like `v1.0.0`  -> builds Win + Mac zips AND publishes a
#      GitHub Release with them attached. This is the "cut a release" path.
#   2. "Run workflow" button (Actions tab, workflow_dispatch) -> builds the
#      same zips but uploads them as temporary CI artifacts only. Nothing is
#      published. Use this to test the pipeline before ever tagging.
#
# Nothing here runs on ordinary pushes to main, so committing this file does
# not create any release by itself.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Package desktop app (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Temporary artifacts for manual (workflow_dispatch) test runs.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: robotworld-${{ matrix.platform }}
          path: release/*.zip
          if-no-files-found: error

      # Attach zips to a GitHub Release, but only for tag pushes.
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          fail_on_unmatched_files: true
