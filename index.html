<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#05070c" />
  <title>ROBOTWORLD — Mech Battle Arena</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="vignette"></div>
    <div id="ui-root"></div>
    <!-- Shown only on touch devices held in portrait (CSS-gated). -->
    <div id="rotate-hint">
      <div class="rot-inner">
        <div class="rot-icon">📱↻</div>
        <div class="rot-title">Rotate your device</div>
        <div class="rot-sub">ROBOTWORLD plays best in landscape</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
